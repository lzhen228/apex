server:
  port: 8083
  servlet:
    context-path: /competition

spring:
  application:
    name: apex-competition
  profiles:
    active: dev
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/apex
    username: postgres
    password: postgres
  redis:
    host: localhost
    port: 6379
    database: 0
  jackson:
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath:mapper/*.xml

knife4j:
  enable: true
  setting:
    language: zh_cn

logging:
  level:
    com.harbourbiomed.apex: DEBUG
    com.baomidou.mybatisplus: DEBUG
