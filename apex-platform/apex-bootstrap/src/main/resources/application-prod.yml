spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          min-idle: 1

apex:
  jwt:
    secret: ${JWT_SECRET}
    expiration: 7200
  feishu:
    enabled: ${APEX_FEISHU_ENABLED}
    app-id: ${APEX_FEISHU_APP_ID}
    app-secret: ${APEX_FEISHU_APP_SECRET}
    redirect-uri: ${APEX_FEISHU_REDIRECT_URI}
    authorize-url: ${APEX_FEISHU_AUTHORIZE_URL}
    access-token-url: ${APEX_FEISHU_ACCESS_TOKEN_URL}

logging:
  level:
    root: INFO
    com.harbourbiomed.apex: INFO
