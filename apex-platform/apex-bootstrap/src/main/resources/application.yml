spring:
  application:
    name: apex-platform
  profiles:
    active: dev
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  # MyBatis-Plus 需要识别 JSONB 类型
  jackson:
    default-property-inclusion: non_null

server:
  port: 8080
  servlet:
    context-path: /api

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true

knife4j:
  enable: true
  setting:
    language: zh_cn

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:mapper/*.xml

# Hot reload
spring.devtools:
  restart:
    enabled: true
    additional-paths: src/main/java
  livereload:
    enabled: true

logging:
  level:
    root: INFO
    com.harbourbiomed.apex: DEBUG

apex:
  feishu:
    enabled: ${APEX_FEISHU_ENABLED:false}
    app-id: ${APEX_FEISHU_APP_ID:}
    app-secret: ${APEX_FEISHU_APP_SECRET:}
    redirect-uri: ${APEX_FEISHU_REDIRECT_URI:http://localhost:3000/login}
    authorize-url: ${APEX_FEISHU_AUTHORIZE_URL:https://open.feishu.cn/connect/qrconnect/page/sso}
    access-token-url: ${APEX_FEISHU_ACCESS_TOKEN_URL:https://open.feishu.cn/open-apis/authen/v1/access_token}
