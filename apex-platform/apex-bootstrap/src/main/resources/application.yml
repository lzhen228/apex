spring:
  application:
    name: apex-platform
  profiles:
    active: dev
  
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080
  servlet:
    context-path: /api
  
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
  
knife4j:
  enable: true
  setting:
    language: zh_cn
    swagger-model-name: 实体类列表

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

logging:
  level:
    root: INFO
    com.harbourbiomed.apex: DEBUG
    com.baomidou.mybatisplus: DEBUG

xxl:
  job:
    enabled: false
    admin:
      addresses: http://127.0.0.1:8080/xxl-job-admin
    executor:
      appname: apex-platform
      address:
      ip:
      port: 9999
      logpath: ./logs/xxl-job
      logretentiondays: 30
    accessToken: default_token
