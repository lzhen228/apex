server:
  port: 8083
  servlet:
    context-path: /api

spring:
  application:
    name: apex-data-sync
  
  # 数据源配置
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/apex_db
    username: postgres
    password: postgres
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  
  # Redis 配置
  redis:
    host: localhost
    port: 6379
    password: 
    database: 0
    timeout: 5000ms
    lettuce:
      pool:
        max-active: 20
        max-idle: 10
        min-idle: 5

# 阿里云 OSS 配置
aliyun:
  oss:
    endpoint: oss-cn-hangzhou.aliyuncs.com
    access-key-id: ${ALIYUN_OSS_ACCESS_KEY_ID}
    access-key-secret: ${ALIYUN_OSS_ACCESS_KEY_SECRET}
    bucket-name: pharmcube2harbour
    ci-tracking-parquet-path: pharmcube2harbour_ci_tracking_info_0.parquet
    local-temp-dir: /tmp/apex-sync

# XXL-Job 配置
xxl:
  job:
    enabled: true
    admin:
      addresses: http://localhost:8080/xxl-job-admin
    executor:
      appname: apex-data-sync
      address:
      ip:
      port: 9999
      accessToken: ${XXL_JOB_ACCESS_TOKEN:}
      logpath: /data/applogs/xxl-job/jobhandler
      logretentiondays: 30

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.harbourbiomed.apex.datasync.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# 日志配置
logging:
  level:
    root: INFO
    com.harbourbiomed.apex: DEBUG
    com.harbourbiomed.apex.datasync: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
  file:
    name: /var/log/apex/datasync.log
    max-size: 100MB
    max-history: 30
    total-size-cap: 3GB
